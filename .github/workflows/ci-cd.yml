name: Angular CI/CD

on:
  push:
    branches:
      - master # push 到 master 時觸發
  pull_request:
    branches:
      - master # PR 到 master 時也觸發（跑測試）

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Job 1: CI - Build & Test ───────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代碼
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      # 2. 設定 Node.js 版本，啟用 npm cache 加速
      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: "24"
          cache: "npm"

      # 3. 安裝依賴（比 npm install 更嚴謹）
      - name: Install dependencies
        run: npm ci

      # 4. 執行 Unit Tests（無頭 Chrome）
      - name: Run Unit Tests
        run: npm test -- --watch=false

      # 5. Build 生產版本
      - name: Build Production
        run: npm run build -- --configuration production --base-href "/CiCdTesting/"

      # 6. 上傳 dist/ 為 Artifact（供 CD job 使用）
      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: angular-dist
          path: dist/CiCdTesting/browser # Angular 17+ 輸出路徑
          retention-days: 1

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/saicheunghk/cicdtesting:latest
            ghcr.io/saicheunghk/cicdtesting:${{ github.sha }}

  # ─── Job 2: CD - Deploy to GitHub Pages ─────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: ci # 等 CI 通過才部署
    if: github.ref == 'refs/heads/master' # 只有 push 到 master 才部署

    permissions:
      contents: write # 需要寫入 gh-pages branch

    steps:
      # 1. 下載 Build Artifact
      - name: Download artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: angular-dist
          path: ./dist

      # 2. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
